<!DOCTYPE html>
<html lang="ru" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <title>CookFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                50: "#FFF7ED", 100: "#FFEDD5", 200: "#FED7AA", 300: "#FDBA74",
                400: "#FB923C", 500: "#F97316", 600: "#EA580C", 700: "#C2410C",
                800: "#9A3412", 900: "#7C2D12",
              },
              background: { soft: "#FAFAF9", card: "#FFFFFF" },
            },
          },
        },
      };
    </script>

    <!-- React 18 UMD (no ESM) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel: compile JSX in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <style>
      body { -webkit-font-smoothing: antialiased; }
      .modal-backdrop { background: rgba(0,0,0,0.25); backdrop-filter: blur(6px); }
      .reels-container { scroll-snap-type: y mandatory; overflow-y: scroll; overflow-x: hidden; height: 100dvh; height: 100vh; -webkit-overflow-scrolling: touch; }
      .reels-container > * { scroll-snap-align: start; scroll-snap-stop: always; }
    </style>
  </head>
  <body class="h-full bg-background-soft min-h-screen">
    <div id="root" class="min-h-full"></div>

    <script type="text/babel" data-type="module">
      const { useState, useMemo } = React;
      const { createRoot } = ReactDOM;

      const TABS = { FEED: "FEED", LIBRARY: "LIBRARY", PLANNER: "PLANNER" };
      const DAYS = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];
      const MEALS = ["Завтрак", "Обед", "Ужин"];

      const initialRecipes = [
        { id: "r1", title: "Паста с чесноком и сливками", shortDescription: "Ужин в одной кастрюле за 15 минут.", duration: "15 мин", difficulty: "Легко", calories: "520 ккал", color: "from-orange-300 via-amber-300 to-rose-200",
          youtubeId: "OOQYS7VERMw",
          ingredients: ["200 г спагетти", "3 зубчика чеснока", "200 мл сливок", "30 г пармезана", "Оливковое масло, соль, перец"],
          steps: ["Сварите пасту в подсолённой воде до аль денте.", "Обжарьте чеснок на оливковом масле на слабом огне.", "Добавьте сливки, потомите 2–3 минуты, приправьте.", "Добавьте пасту и пармезан, перемешайте."] },
        { id: "r2", title: "Будда-боул по-средиземноморски", shortDescription: "Яркий сытный обед с овощами.", duration: "25 мин", difficulty: "Средне", calories: "640 ккал", color: "from-amber-200 via-lime-200 to-emerald-200",
          youtubeId: "jYj-lCtZU8A",
          ingredients: ["120 г киноа", "1 авокадо", "150 г нута", "Помидоры черри, огурец, красный лук", "Тахин, лимон, оливковое масло, чеснок"],
          steps: ["Сварите киноа по инструкции.", "Нут смешайте с маслом, солью и паприкой.", "Сделайте заправку из тахини, лимона и чеснока.", "Соберите боул: киноа, овощи, нут, авокадо, заправка."] },
        { id: "r3", title: "Овсяный парфе на завтрак", shortDescription: "Завтрак в стакане — быстро и вкусно.", duration: "10 мин", difficulty: "Легко", calories: "380 ккал", color: "from-orange-200 via-pink-200 to-sky-200",
          youtubeId: "_gadU4xI5fs",
          ingredients: ["60 г овсянки", "150 мл молока", "Греческий йогурт", "Ягоды, банан", "Мёд, семена чиа"],
          steps: ["Смешайте овсянку, молоко и чиа, оставьте на 5 минут.", "Выложите слоями с йогуртом в стакан.", "Сверху — банан, ягоды, мёд."] },
        { id: "r4", title: "Лосось на противне с брокколи", shortDescription: "Простой ужин на одном противне.", duration: "20 мин", difficulty: "Легко", calories: "450 ккал", color: "from-amber-300 via-orange-300 to-red-200",
          youtubeId: "d1wXX9xO_2o",
          ingredients: ["2 стейка лосося", "Соцветия брокколи", "Чили, чесночный порошок", "Соевый соус, мёд, оливковое масло"],
          steps: ["Смешайте соевый соус, мёд, чили и чеснок.", "Выложите лосось и брокколи на противень, полейте маринадом.", "Запекайте при 200°C 12–15 минут."] },
      ];

      function cn(...classes) { return classes.filter(Boolean).join(" "); }

      const Icons = {
        Home: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
        Bookmark: ({ filled }) => <svg className="w-5 h-5" fill={filled ? "currentColor" : "none"} stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" /></svg>,
        CalendarRange: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
        Play: () => <svg className="w-7 h-7 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>,
        Sparkles: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>,
        Plus: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>,
        X: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>,
        ChefHat: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>,
        Utensils: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 00-2 2v1a2 2 0 002 2h14a2 2 0 002-2v-1a2 2 0 00-2-2M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7" /></svg>,
        Clock: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>,
        FlameKindling: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.879 16.121A3 3 0 1012.015 11L11 14H9c0 .768.293 1.536.879 2.121z" /></svg>,
      };

      function ReelCard({ recipe, isSaved, onToggleSave, onOpenIngredients }) {
        const embedSrc = recipe.youtubeId
          ? "https://www.youtube.com/embed/" + recipe.youtubeId + "?rel=0&modestbranding=1&playsinline=1"
          : null;
        return (
          <div className="relative w-full flex flex-col bg-slate-900" style={{ minHeight: "100dvh" }}>
            {embedSrc ? (
              <iframe
                src={embedSrc}
                title={recipe.title}
                className="absolute inset-0 w-full h-full object-cover"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowFullScreen
                style={{ border: "none" }}
              />
            ) : (
              <div className={cn("absolute inset-0 bg-gradient-to-br", recipe.color)} />
            )}
            <div className="absolute inset-0 bg-gradient-to-t from-black/85 via-black/25 to-transparent pointer-events-none" />
            <div className="absolute left-4 top-[max(env(safe-area-inset-top),1rem)] inline-flex items-center gap-1.5 rounded-full bg-black/40 border border-white/10 px-3 py-1.5 text-xs font-medium text-white pointer-events-none">
              <Icons.FlameKindling /> В тренде
            </div>
            <div className="absolute bottom-0 left-0 right-0 p-4 pb-[calc(6rem+env(safe-area-inset-bottom))] space-y-3">
              <div className="flex items-center justify-between text-xs text-white/90">
                <div className="inline-flex items-center gap-1.5 rounded-full bg-black/40 border border-white/10 px-2.5 py-1">
                  <Icons.Clock /> <span>{recipe.duration}</span>
                </div>
                <span className="rounded-full bg-black/40 border border-white/10 px-2.5 py-1">{recipe.calories}</span>
              </div>
              <h3 className="text-xl font-semibold text-white leading-tight">{recipe.title}</h3>
              <p className="text-sm text-white/80">{recipe.shortDescription}</p>
              <div className="flex gap-2">
                <button onClick={() => onOpenIngredients(recipe)} className="flex-1 inline-flex items-center justify-center gap-2 rounded-xl bg-white/95 border border-slate-200 px-4 py-2.5 text-xs font-semibold text-slate-900">
                  <Icons.Utensils /> Ингредиенты
                </button>
                <button onClick={() => onToggleSave(recipe.id)} className={cn("inline-flex items-center justify-center gap-1.5 rounded-xl border px-3 py-2.5 text-xs font-semibold transition-colors", isSaved ? "bg-slate-900 text-white border-slate-600" : "bg-white/95 text-slate-900 border-slate-200")}>
                  <Icons.Bookmark filled={isSaved} /> {isSaved ? "Сохранено" : "Сохранить"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      function BottomNav({ activeTab, onChangeTab }) {
        const items = [
          { id: TABS.FEED, label: "Лента", icon: "Home" },
          { id: TABS.LIBRARY, label: "Рецепты", icon: "Bookmark" },
          { id: TABS.PLANNER, label: "План", icon: "CalendarRange" },
        ];
        return (
          <nav className="fixed inset-x-0 bottom-0 z-20 border-t border-slate-200 bg-white/95 backdrop-blur-md safe-area-pb">
            <div className="mx-auto flex max-w-md items-center justify-between px-6 py-2.5">
              {items.map((item) => {
                const Icon = Icons[item.icon];
                const isActive = activeTab === item.id;
                return (
                  <button key={item.id} onClick={() => onChangeTab(item.id)} className="relative flex flex-1 flex-col items-center gap-1 py-1">
                    <div className={cn("flex h-10 w-10 items-center justify-center rounded-xl border transition-all", isActive ? "bg-primary-50 border-primary-200 text-primary-600" : "border-transparent bg-transparent text-slate-400")}>
                      <Icon />
                    </div>
                    <span className={cn("text-[11px] font-medium", isActive ? "text-slate-900" : "text-slate-400")}>{item.label}</span>
                  </button>
                );
              })}
            </div>
          </nav>
        );
      }

      function RecipeModal({ open, onClose, recipe }) {
        if (!open || !recipe) return null;
        return (
          <div className="fixed inset-0 z-30 flex items-end justify-center modal-backdrop sm:items-center" onClick={onClose}>
            <div className="relative w-full max-w-md rounded-t-2xl sm:rounded-2xl bg-background-card border border-slate-200 max-h-[85vh] overflow-hidden" onClick={e => e.stopPropagation()}>
              <div className="flex items-center justify-between border-b border-slate-100 px-5 py-4">
                <div className="flex items-center gap-2">
                  <Icons.Utensils /> <h2 className="text-sm font-semibold text-slate-900">Ингредиенты</h2>
                </div>
                <button onClick={onClose} className="rounded-xl p-1.5 text-slate-400 hover:bg-slate-100 border border-transparent"><Icons.X /></button>
              </div>
              <div className="space-y-4 px-5 py-4 overflow-y-auto max-h-[65vh]">
                <h3 className="text-base font-semibold text-slate-900">{recipe.title}</h3>
                <p className="text-xs text-slate-500">{recipe.shortDescription}</p>
                <div className="space-y-1.5">
                  <p className="text-xs font-semibold uppercase tracking-wide text-slate-400">Ингредиенты</p>
                  <ul className="space-y-1.5 text-sm text-slate-800">
                    {recipe.ingredients.map((ing, idx) => (
                      <li key={idx} className="flex items-start gap-2 text-[13px]">
                        <span className="mt-[6px] h-1.5 w-1.5 rounded-full bg-primary-400" /> <span>{ing}</span>
                      </li>
                    ))}
                  </ul>
                </div>
                <div className="space-y-1.5">
                  <p className="text-xs font-semibold uppercase tracking-wide text-slate-400">Шаги</p>
                  <ol className="space-y-2 text-sm text-slate-800">
                    {recipe.steps.map((step, idx) => (
                      <li key={idx} className="flex gap-2 text-[13px]">
                        <span className="mt-[1px] flex h-5 w-5 items-center justify-center rounded-full bg-primary-50 text-[11px] font-semibold text-primary-700">{idx + 1}</span>
                        <span>{step}</span>
                      </li>
                    ))}
                  </ol>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function AiRecipeCreatorModal({ open, onClose, onAddRecipe }) {
        const [rawText, setRawText] = useState("");
        const [formatted, setFormatted] = useState(null);

        function simulateAIFormat() {
          if (!rawText.trim()) return;
          const lines = rawText.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
          const title = lines[0] || "Рецепт от ИИ";
          const ingredients = [];
          const steps = [];
          for (let i = 1; i < lines.length; i++) {
            const line = lines[i];
            if (!line) continue;
            if (line.toLowerCase().startsWith("step") || /^[0-9]+\./.test(line)) {
              steps.push(line.replace(/^[0-9]+\.\s*/, "").trim());
            } else if (line.includes(",") || /^[-*]/.test(line) || /g\b|ml\b|tbsp\b|tsp\b|cup\b/i.test(line)) {
              ingredients.push(line.replace(/^[-*]\s*/, "").trim());
            } else {
              steps.push(line);
            }
          }
          if (!ingredients.length) ingredients.push("Щепотка любопытства", "Немного креатива");
          if (!steps.length) steps.push("Прочитайте заметки и выстройте логичный порядок.", "Готовьте с душой и пробуйте по ходу.");
          setFormatted({
            title, ingredients, steps,
            shortDescription: "Собрано из ваших голосовых заметок.",
            duration: "20 мин", difficulty: "Легко", calories: "~500 ккал",
            color: "from-amber-100 via-orange-100 to-rose-100",
          });
        }

        function handleSave() {
          if (!formatted) return;
          onAddRecipe({ id: "ai_" + Date.now().toString(36), ...formatted });
          setRawText(""); setFormatted(null); onClose();
        }

        if (!open) return null;
        return (
          <div className="fixed inset-0 z-40 flex items-end justify-center modal-backdrop sm:items-center" onClick={() => { setRawText(""); setFormatted(null); onClose(); }}>
            <div className="relative w-full max-w-md rounded-t-2xl bg-background-card sm:rounded-2xl border border-slate-200 max-h-[90vh] overflow-hidden" onClick={e => e.stopPropagation()}>
              <div className="flex items-center justify-between border-b border-slate-100 px-5 py-4">
                <div className="flex items-center gap-2">
                  <Icons.Sparkles />
                  <div>
                    <h2 className="text-sm font-semibold text-slate-900">Рецепт от ИИ</h2>
                    <p className="text-[11px] text-slate-500">Вставьте или надиктуйте заметки — мы оформим рецепт.</p>
                  </div>
                </div>
                <button onClick={() => { setRawText(""); setFormatted(null); onClose(); }} className="rounded-xl p-1.5 text-slate-400 hover:bg-slate-100"><Icons.X /></button>
              </div>
              <div className="space-y-4 px-5 py-4 overflow-y-auto max-h-[70vh]">
                <div className="space-y-2">
                  <label className="text-xs font-medium text-slate-600">Голосовые или хаотичные заметки</label>
                  <textarea value={rawText} onChange={e => setRawText(e.target.value)} placeholder="Например: быстрая паста с курицей, 200 г пасты, 1 грудка, сливки, чеснок, сварить пасту, обжарить курицу, добавить чеснок и сливки, перемешать..." rows={5} className="w-full resize-none rounded-xl border border-slate-200 bg-slate-50 px-3.5 py-3 text-sm text-slate-900 outline-none placeholder:text-slate-400 focus:ring-2 ring-primary-200" />
                  <button onClick={simulateAIFormat} className="inline-flex items-center gap-2 rounded-xl bg-slate-900 px-4 py-2 text-xs font-semibold text-white border border-slate-700 hover:bg-slate-800">
                    <Icons.Sparkles /> Оформить рецепт
                  </button>
                </div>
                {formatted && (
                  <div className="rounded-xl border border-slate-200 bg-slate-50/80 p-4">
                    <p className="mb-2 text-[11px] font-semibold uppercase tracking-wide text-slate-400">Предпросмотр</p>
                    <h3 className="text-base font-semibold text-slate-900">{formatted.title}</h3>
                    <p className="mt-1 text-xs text-slate-500">{formatted.shortDescription}</p>
                    <div className="mt-3 grid grid-cols-3 gap-2 text-[11px] text-slate-600">
                      <div className="flex items-center gap-1"><Icons.Clock /> <span>{formatted.duration}</span></div>
                      <div className="flex items-center gap-1"><Icons.ChefHat /> <span>{formatted.difficulty}</span></div>
                      <div className="flex items-center gap-1"><Icons.FlameKindling /> <span>{formatted.calories}</span></div>
                    </div>
                    <div className="mt-3 space-y-1.5">
                      <p className="text-[11px] font-semibold uppercase tracking-wide text-slate-400">Ингредиенты</p>
                      <ul className="space-y-1 text-[12px] text-slate-800">
                        {formatted.ingredients.map((ing, idx) => (
                          <li key={idx} className="flex gap-1.5"><span className="mt-[6px] h-1 w-1 rounded-full bg-primary-400" /><span>{ing}</span></li>
                        ))}
                      </ul>
                    </div>
                    <div className="mt-3 space-y-1.5">
                      <p className="text-[11px] font-semibold uppercase tracking-wide text-slate-400">Шаги</p>
                      <ol className="space-y-1.5 text-[12px] text-slate-800">
                        {formatted.steps.map((step, idx) => (
                          <li key={idx} className="flex gap-1.5">
                            <span className="mt-[1px] flex h-4 w-4 items-center justify-center rounded-full bg-primary-50 text-[10px] font-semibold text-primary-700">{idx + 1}</span>
                            <span>{step}</span>
                          </li>
                        ))}
                      </ol>
                    </div>
                  </div>
                )}
              </div>
              <div className="border-t border-slate-100 px-5 py-3.5">
                <button disabled={!formatted} onClick={handleSave} className={cn("flex w-full items-center justify-center gap-2 rounded-xl px-4 py-2.5 text-sm font-semibold border transition-colors", formatted ? "bg-primary-500 text-white border-primary-600 hover:bg-primary-600" : "bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed")}>
                  <Icons.Plus /> Сохранить в «Мои рецепты»
                </button>
              </div>
            </div>
          </div>
        );
      }

      function MealPlanner({ savedRecipes, planner, setPlanner }) {
        const [selectingCell, setSelectingCell] = useState(null);

        function openSelector(day, meal) {
          if (!savedRecipes.length) return;
          setSelectingCell({ day, meal });
        }

        function assignRecipeToCell(recipeId) {
          if (!selectingCell) return;
          const { day, meal } = selectingCell;
          setPlanner(prev => ({ ...prev, [day]: { ...(prev[day] || {}), [meal]: recipeId } }));
          setSelectingCell(null);
        }

        const recipeById = useMemo(() => {
          const map = {};
          for (const r of savedRecipes) map[r.id] = r;
          return map;
        }, [savedRecipes]);

        return (
          <div className="pb-28">
            <section className="mb-5 mt-1">
              <div className="flex items-center gap-3">
                <div className="inline-flex h-11 w-11 items-center justify-center rounded-xl bg-primary-50 text-primary-600 border border-primary-100"><Icons.CalendarRange /></div>
                <div>
                  <h2 className="text-lg font-semibold text-slate-900">План на неделю</h2>
                  <p className="text-xs text-slate-500">Нажмите на ячейку и выберите рецепт.</p>
                </div>
              </div>
            </section>
            {!savedRecipes.length && (
              <div className="mb-5 rounded-xl bg-white px-4 py-3 text-xs text-slate-600 border border-slate-200">
                Пока нет сохранённых рецептов. Сохраняйте из ленты или добавляйте в «Рецепты», чтобы планировать неделю.
              </div>
            )}
            <div className="overflow-hidden rounded-2xl bg-white border border-slate-200">
              <div className="flex border-b border-slate-100 bg-slate-50/80 px-3 py-2 text-[11px] font-semibold uppercase tracking-wide text-slate-500">
                <div className="w-12 shrink-0" />
                {DAYS.map(d => <div key={d} className="flex-1 text-center">{d}</div>)}
              </div>
              {MEALS.map((meal, rowIdx) => (
                <div key={meal} className={cn("flex border-b border-slate-100 text-xs", rowIdx === MEALS.length - 1 ? "border-b-0" : "")}>
                  <div className="flex w-12 shrink-0 items-center justify-center border-r border-slate-100 bg-slate-50/80 px-1 text-[11px] font-medium text-slate-600">{meal[0]}</div>
                  {DAYS.map(day => {
                    const assignedId = planner?.[day]?.[meal] ?? null;
                    const assignedRecipe = recipeById[assignedId];
                    return (
                      <button key={day} onClick={() => openSelector(day, meal)} className={cn("relative flex-1 border-r border-slate-100 px-1.5 py-2 text-left transition-colors", savedRecipes.length ? "hover:bg-primary-50/40" : "bg-slate-50 cursor-default")}>
                        {assignedRecipe ? (
                          <div className="space-y-0.5">
                            <p className="line-clamp-2 text-[11px] font-semibold text-slate-900">{assignedRecipe.title}</p>
                            <p className="text-[10px] text-slate-500">{assignedRecipe.duration} · {assignedRecipe.calories}</p>
                          </div>
                        ) : (
                          <span className="inline-flex items-center gap-1 text-[10px] text-slate-400"><Icons.Plus /> Добавить</span>
                        )}
                      </button>
                    );
                  })}
                </div>
              ))}
            </div>
            {selectingCell && (
              <div className="fixed inset-0 z-30 flex items-end justify-center modal-backdrop sm:items-center" onClick={() => setSelectingCell(null)}>
                <div className="w-full max-w-md rounded-t-2xl bg-background-card sm:rounded-2xl border border-slate-200 max-h-[75vh] overflow-hidden" onClick={e => e.stopPropagation()}>
                  <div className="flex items-center justify-between border-b border-slate-100 px-5 py-4">
                    <div className="flex items-center gap-2">
                      <Icons.CalendarRange />
                      <div>
                        <p className="text-xs font-semibold uppercase tracking-wide text-slate-400">Назначить рецепт</p>
                        <p className="text-sm font-semibold text-slate-900">{selectingCell.day} · {selectingCell.meal}</p>
                      </div>
                    </div>
                    <button onClick={() => setSelectingCell(null)} className="rounded-xl p-1.5 text-slate-400 hover:bg-slate-100"><Icons.X /></button>
                  </div>
                  <div className="max-h-[55vh] overflow-y-auto px-4 py-3 space-y-2.5">
                    {savedRecipes.map(recipe => {
                      const isActive = planner?.[selectingCell.day]?.[selectingCell.meal] === recipe.id;
                      return (
                        <button key={recipe.id} onClick={() => assignRecipeToCell(recipe.id)} className={cn("flex w-full items-center justify-between gap-3 rounded-xl border px-3.5 py-2.5 text-left transition-colors", isActive ? "border-primary-400 bg-primary-50" : "border-slate-200 bg-white hover:bg-slate-50")}>
                          <div className="flex-1">
                            <p className="line-clamp-1 text-[13px] font-semibold text-slate-900">{recipe.title}</p>
                            <p className="mt-0.5 text-[11px] text-slate-500">{recipe.duration} · {recipe.calories}</p>
                          </div>
                          <div className="flex items-center gap-2 text-[11px] text-slate-500"><Icons.ChefHat /> {isActive ? "Выбрано" : "Выбрать"}</div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      function RecipeLibrary({ recipes, savedIds, onToggleSave, onOpenAiModal }) {
        const savedRecipes = recipes.filter(r => savedIds.includes(r.id));
        return (
          <div className="pb-28 pt-1 space-y-5">
            <section className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="inline-flex h-11 w-11 items-center justify-center rounded-xl bg-primary-50 text-primary-600 border border-primary-100"><Icons.Bookmark /></div>
                <div>
                  <h2 className="text-lg font-semibold text-slate-900">Мои рецепты</h2>
                  <p className="text-xs text-slate-500">Сохранённые и созданные ИИ — в одном месте.</p>
                </div>
              </div>
              <button onClick={onOpenAiModal} className="inline-flex h-10 items-center gap-1.5 rounded-xl bg-slate-900 px-3.5 text-[11px] font-semibold text-white border border-slate-700 hover:bg-slate-800">
                <Icons.Sparkles /> Рецепт от ИИ
              </button>
            </section>
            {savedRecipes.length === 0 ? (
              <div className="rounded-2xl bg-white px-4 py-4 border border-slate-200">
                <div className="flex items-start gap-3">
                  <div className="mt-0.5 rounded-xl bg-primary-50 p-2 text-primary-600 border border-primary-100"><Icons.Home /></div>
                  <div className="space-y-1">
                    <p className="text-sm font-semibold text-slate-900">Пока тут пусто</p>
                    <p className="text-xs text-slate-500">Сохраняйте рецепты из ленты или создайте свой через «Рецепт от ИИ».</p>
                  </div>
                </div>
              </div>
            ) : (
              <div className="grid gap-3">
                {savedRecipes.map(recipe => (
                  <div key={recipe.id} className="flex gap-3 rounded-2xl bg-white p-3.5 border border-slate-200">
                    <div className={cn("relative h-20 w-20 shrink-0 overflow-hidden rounded-xl bg-gradient-to-br border border-slate-100", recipe.color)}>
                      <div className="absolute inset-0 flex items-center justify-center">
                        <span className="flex h-8 w-8 items-center justify-center rounded-full bg-white/95 text-primary-500 border border-slate-200"><Icons.Play /></span>
                      </div>
                    </div>
                    <div className="flex-1 space-y-2 min-w-0">
                      <div className="flex items-start justify-between gap-2">
                        <div className="min-w-0">
                          <p className="line-clamp-2 text-sm font-semibold text-slate-900">{recipe.title}</p>
                          <p className="mt-1 text-[11px] text-slate-500">{recipe.shortDescription}</p>
                        </div>
                        <button onClick={() => onToggleSave(recipe.id)} className="rounded-xl bg-slate-100 p-1.5 text-slate-500 hover:bg-slate-200 border border-transparent shrink-0">
                          <Icons.Bookmark filled />
                        </button>
                      </div>
                      <div className="flex items-center gap-3 text-[11px] text-slate-500 flex-wrap">
                        <span className="inline-flex items-center gap-1 rounded-lg bg-slate-50 px-2 py-1 border border-slate-100"><Icons.Clock /> {recipe.duration}</span>
                        <span className="inline-flex items-center gap-1 rounded-lg bg-slate-50 px-2 py-1 border border-slate-100"><Icons.ChefHat /> {recipe.difficulty}</span>
                        <span>{recipe.calories}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      function Feed({ recipes, savedIds, onToggleSave, onOpenIngredients }) {
        return (
          <div className="reels-container fixed inset-0 top-0 left-0 right-0 bottom-0 pt-[env(safe-area-inset-top)] pb-[5.5rem]" style={{ paddingBottom: "calc(5.5rem + env(safe-area-inset-bottom))" }}>
            {recipes.map(recipe => (
              <ReelCard key={recipe.id} recipe={recipe} isSaved={savedIds.includes(recipe.id)} onToggleSave={onToggleSave} onOpenIngredients={onOpenIngredients} />
            ))}
          </div>
        );
      }

      function App() {
        const [activeTab, setActiveTab] = useState(TABS.FEED);
        const [recipes, setRecipes] = useState(initialRecipes);
        const [savedIds, setSavedIds] = useState(initialRecipes.map(r => r.id).slice(0, 2));
        const [planner, setPlanner] = useState({});
        const [ingredientsModalRecipe, setIngredientsModalRecipe] = useState(null);
        const [aiModalOpen, setAiModalOpen] = useState(false);

        function toggleSave(id) {
          setSavedIds(prev => prev.includes(id) ? prev.filter(rId => rId !== id) : [...prev, id]);
        }

        function handleAddRecipe(newRecipe) {
          setRecipes(prev => [...prev, newRecipe]);
          setSavedIds(prev => [...prev, newRecipe.id]);
        }

        const savedRecipes = useMemo(() => recipes.filter(r => savedIds.includes(r.id)), [recipes, savedIds]);

        return (
          <div className="flex min-h-full justify-center bg-background-soft">
            <div className="relative flex h-full w-full max-w-md flex-col min-h-screen">
              {activeTab !== TABS.FEED && (
                <header className="flex items-center justify-between px-4 pt-6 pb-2 border-b border-slate-100 bg-background-soft">
                  <div className="flex items-center gap-2">
                    <div className="inline-flex h-8 w-8 items-center justify-center rounded-xl bg-slate-900 text-amber-300 border border-slate-700"><Icons.ChefHat /></div>
                    <div>
                      <p className="text-[11px] font-medium uppercase tracking-wide text-slate-400">CookFlow</p>
                      <p className="text-sm font-semibold text-slate-900">Планировщик еды</p>
                    </div>
                  </div>
                  <div className="inline-flex items-center gap-2 rounded-xl bg-white px-3 py-1 text-[11px] text-slate-600 border border-slate-200">
                    <div className="h-2 w-2 rounded-full bg-emerald-400" /> Неделя в плане
                  </div>
                </header>
              )}

              <main className="flex-1 overflow-hidden relative">
                {activeTab === TABS.FEED && (
                  <Feed recipes={recipes} savedIds={savedIds} onToggleSave={toggleSave} onOpenIngredients={r => setIngredientsModalRecipe(r)} />
                )}
                {activeTab === TABS.LIBRARY && (
                  <div className="overflow-y-auto pb-24 px-4 pt-4">
                    <RecipeLibrary recipes={recipes} savedIds={savedIds} onToggleSave={toggleSave} onOpenAiModal={() => setAiModalOpen(true)} />
                  </div>
                )}
                {activeTab === TABS.PLANNER && (
                  <div className="overflow-y-auto pb-24 px-4 pt-4">
                    <MealPlanner savedRecipes={savedRecipes} planner={planner} setPlanner={setPlanner} />
                  </div>
                )}
              </main>

              <BottomNav activeTab={activeTab} onChangeTab={setActiveTab} />

              <RecipeModal open={!!ingredientsModalRecipe} recipe={ingredientsModalRecipe} onClose={() => setIngredientsModalRecipe(null)} />
              <AiRecipeCreatorModal open={aiModalOpen} onClose={() => setAiModalOpen(false)} onAddRecipe={handleAddRecipe} />
            </div>
          </div>
        );
      }

      const root = document.getElementById("root");
      const reactRoot = createRoot(root);
      reactRoot.render(<App />);
    </script>
  </body>
</html>
